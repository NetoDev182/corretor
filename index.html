<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordenador ABNT | IA DeepSeek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        #resultsContent {
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            max-width: 100%;
            overflow-x: hidden;
            line-height: 1.75;
            font-size: 0.95rem;
        }
        #resultsContent h1, #resultsContent h2, #resultsContent h3 {
            font-weight: 700;
            color: #3730a3;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }
        #resultsContent h2 { font-size: 1.15rem; border-bottom: 1px solid #e0e7ff; padding-bottom: 0.3rem; }
        #resultsContent h3 { font-size: 1rem; }
        #resultsContent p  { margin-bottom: 0.75rem; }
        #resultsContent strong { color: #1e1b4b; }
        #resultsContent hr { border-color: #e0e7ff; margin: 1.25rem 0; }
        #resultsContent ul, #resultsContent ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
        #resultsContent li { margin-bottom: 0.35rem; }
        #resultsContent code {
            background: #f1f5f9;
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-size: 0.875em;
            word-break: break-all;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto space-y-8">

        <!-- Header -->
        <header class="text-center pt-4">
            <h1 class="text-4xl font-extrabold text-indigo-900 mb-3 tracking-tight">🎓 Coordenador de Revisão ABNT</h1>
            <p class="text-gray-500 text-lg">Envie seu TCC ou Artigo (PDF) e analise automaticamente as normas com o DeepSeek.</p>
        </header>

        <!-- Formulário -->
        <main class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 space-y-6">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">🔑 Chave da API da DeepSeek</label>
                <input type="password" id="apiKey"
                    class="mt-1 block w-full rounded-lg border border-gray-300 shadow-sm p-3 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="sk-...">
                <p class="text-xs text-gray-400 mt-1">Não é salva. Enviada diretamente à API em cada requisição.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">📄 Selecione o Documento (PDF)</label>
                <input type="file" id="pdfFile" accept="application/pdf"
                    class="mt-1 block w-full text-sm text-gray-500
                    file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0
                    file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700
                    hover:file:bg-indigo-100 cursor-pointer border border-gray-200 rounded-lg p-2">
            </div>

            <button id="btnAnalisar"
                class="w-full bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-md">
                🎯 Iniciar Revisão Completa
            </button>

            <!-- Barra de progresso -->
            <div id="progressContainer" class="hidden space-y-3 pt-4 border-t border-gray-100">
                <div class="flex justify-between items-center text-sm font-medium text-gray-700">
                    <div class="flex items-center space-x-2">
                        <svg id="spinner" class="animate-spin h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="progressText">Aguarde...</span>
                    </div>
                    <span id="progressPercent" class="text-indigo-600 font-bold">0%</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-3">
                    <div id="progressBar" class="bg-indigo-600 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </main>

        <!-- Resultados -->
        <section id="resultsContainer" class="hidden bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                <h2 class="text-2xl font-bold text-gray-800">📄 Relatório de Correções</h2>
                <button onclick="window.print()"
                    class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center space-x-2">
                    <span>🖨️</span><span>Imprimir / Salvar PDF</span>
                </button>
            </div>
            <div id="resultsContent"></div>
        </section>

    </div>

    <script>
        const ui = {
            btn: document.getElementById('btnAnalisar'),
            file: document.getElementById('pdfFile'),
            key: document.getElementById('apiKey'),
            progressBox: document.getElementById('progressContainer'),
            progressText: document.getElementById('progressText'),
            progressBar: document.getElementById('progressBar'),
            progressPct: document.getElementById('progressPercent'),
            resultsBox: document.getElementById('resultsContainer'),
            resultsContent: document.getElementById('resultsContent')
        };

        // ── 1. Extrai o texto do PDF DIRETO NO NAVEGADOR com PDF.js ──────────
        async function extrairTextoPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let textoCompleto = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const pagina = await pdf.getPage(i);
                const content = await pagina.getTextContent();
                const textoPagina = content.items.map(item => item.str).join(' ');
                textoCompleto += textoPagina + '\n\n';
            }
            return { texto: textoCompleto, paginas: pdf.numPages };
        }

        // ── 2. Fragmenta o texto em blocos de ~4000 chars ────────────────────
        function fragmentarTexto(texto, maxChars = 4000) {
            const paragrafos = texto.split(/\n\s*\n/);
            const fragmentos = [];
            let atual = '';
            for (const p of paragrafos) {
                if ((atual + p).length < maxChars) {
                    atual += p + '\n\n';
                } else {
                    if (atual.trim()) fragmentos.push(atual.trim());
                    atual = p + '\n\n';
                }
            }
            if (atual.trim()) fragmentos.push(atual.trim());
            return fragmentos;
        }

        // ── 3. Envia cada fragmento à API DeepSeek via /api/review_chunk ─────
        async function analisarFragmento(fragmento, apiKey) {
            const resp = await fetch('/api/review_chunk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fragmento, api_key: apiKey })
            });
            const text = await resp.text();
            if (!text) throw new Error('Resposta vazia da função serverless.');
            const data = JSON.parse(text);
            if (!resp.ok) throw new Error(data.erro || `Erro HTTP ${resp.status}`);
            return data.relatorio;
        }

        function setProgresso(pct, msg) {
            ui.progressBar.style.width = `${pct}%`;
            ui.progressPct.innerText = `${pct}%`;
            ui.progressText.innerText = msg;
        }

        // ── Fluxo principal ──────────────────────────────────────────────────
        ui.btn.addEventListener('click', async () => {
            if (!ui.file.files[0]) { alert('⚠️ Selecione um PDF antes de continuar.'); return; }
            if (!ui.key.value) { alert('⚠️ Insira sua chave da API DeepSeek.'); return; }

            ui.btn.disabled = true;
            ui.btn.classList.add('opacity-50', 'cursor-not-allowed');
            ui.resultsBox.classList.add('hidden');
            ui.resultsContent.innerHTML = '';
            ui.progressBox.classList.remove('hidden');
            ui.progressBar.classList.replace('bg-red-500', 'bg-indigo-600');

            try {
                // Passo 1: Leitura local com PDF.js (sem servidor)
                setProgresso(5, '📖 Lendo PDF no navegador (PDF.js)...');
                const { texto, paginas } = await extrairTextoPDF(ui.file.files[0]);

                if (!texto.trim()) {
                    throw new Error('Nenhum texto encontrado no PDF. O arquivo pode ser uma imagem escaneada.');
                }

                // Passo 2: Fragmentação
                setProgresso(10, `✂️ Dividindo ${paginas} página(s) em blocos...`);
                const fragmentos = fragmentarTexto(texto);

                let relatorioFinal = `# Relatório de Revisão ABNT\n\n*${paginas} página(s) analisadas com DeepSeek.*\n\n---\n\n`;

                // Passo 3: Loop de análise com DeepSeek
                for (let i = 0; i < fragmentos.length; i++) {
                    const pct = Math.round(10 + ((i + 1) / fragmentos.length) * 88);
                    setProgresso(pct, `🤖 Analisando parte ${i + 1} de ${fragmentos.length}...`);

                    const relatorio = await analisarFragmento(fragmentos[i], ui.key.value);
                    relatorioFinal += `## 🔎 Parte ${i + 1} / ${fragmentos.length}\n\n${relatorio}\n\n---\n\n`;

                    // Renderização incremental
                    ui.resultsBox.classList.remove('hidden');
                    ui.resultsContent.innerHTML = marked.parse(relatorioFinal);
                    window.scrollTo({ top: ui.resultsBox.offsetTop, behavior: 'smooth' });
                }

                setProgresso(100, '✅ Análise completa!');

            } catch (err) {
                console.error(err);
                alert(`Ocorreu um Erro: ${err.message}`);
                ui.progressText.innerText = '❌ Processamento interrompido.';
                ui.progressBar.classList.replace('bg-indigo-600', 'bg-red-500');
            } finally {
                ui.btn.disabled = false;
                ui.btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
