<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordenador ABNT | Inteligência Artificial</title>
    <!-- Tailwind CSS (Estilo) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js (Render do Markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="text-center">
            <h1 class="text-4xl font-extrabold text-indigo-900 mb-3 tracking-tight">🎓 Coordenador de Revisão ABNT</h1>
            <p class="text-gray-500 text-lg">Envie seu TCC ou Artigo (PDF) e analise automaticamente as normas com o DeepSeek.</p>
        </header>

        <!-- Formulário Control -->
        <main class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 space-y-6">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Chave da API da DeepSeek</label>
                <input type="password" id="apiKey" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm border p-3 focus:ring-indigo-500 focus:border-indigo-500" placeholder="sk-...">
                <p class="text-xs text-gray-400 mt-1">Seu dado não é salvo. Ele é enviado direto ao servidor uma vez.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Selecione o Documento (PDF)</label>
                <input type="file" id="pdfFile" accept="application/pdf" class="mt-1 block w-full text-sm text-gray-500
                  file:mr-4 file:py-3 file:px-4
                  file:rounded-xl file:border-0
                  file:text-sm file:font-bold
                  file:bg-indigo-50 file:text-indigo-700
                  hover:file:bg-indigo-100 cursor-pointer transition-colors border border-gray-200 rounded-lg p-2">
            </div>

            <button id="btnAnalisar" class="w-full bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-md">
                🎯 Iniciar Revisão Completa
            </button>

            <!-- Loading UI -->
            <div id="progressContainer" class="hidden space-y-3 pt-4 border-t border-gray-100">
                <div class="flex justify-between items-center text-sm font-medium text-gray-700">
                    <div class="flex items-center space-x-2">
                        <svg class="animate-spin h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span id="progressText">Aguarde, processando...</span>
                    </div>
                    <span id="progressPercent" class="text-indigo-600 font-bold">0%</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-3">
                    <div id="progressBar" class="bg-indigo-600 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </main>

        <!-- Resultados -->
        <section id="resultsContainer" class="hidden bg-white p-8 rounded-2xl shadow-sm border border-gray-100 print:shadow-none print:border-none">
            <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                <h2 class="text-2xl font-bold text-gray-800">📄 Relatório de Correções</h2>
                <button onclick="window.print()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center space-x-2">
                    <span>🖨️</span> <span>Exportar PDF</span>
                </button>
            </div>
            <!-- Divisão Markdown -->
            <div id="resultsContent" class="prose prose-indigo max-w-none prose-h2:text-indigo-800 prose-h2:border-b prose-h2:pb-2">
                <!-- Conteúdo ABNT inserido aqui -->
            </div>
        </section>

    </div>

    <!-- Lógica de Funcionamento Sem Timeout da Vercel -->
    <script>
        const ui = {
            btn: document.getElementById('btnAnalisar'),
            file: document.getElementById('pdfFile'),
            key: document.getElementById('apiKey'),
            progressBox: document.getElementById('progressContainer'),
            progressText: document.getElementById('progressText'),
            progressBar: document.getElementById('progressBar'),
            progressPct: document.getElementById('progressPercent'),
            resultsBox: document.getElementById('resultsContainer'),
            resultsContent: document.getElementById('resultsContent')
        };

        ui.btn.addEventListener('click', async () => {
            if (!ui.file.files[0]) {
                alert('⚠️ Selecione um arquivo PDF antes de iniciar.');
                return;
            }
            if (!ui.key.value) {
                // Se o deploy da vercel não possuir env, exige digitar
                if(!confirm('Chave de API em branco. Deseja prosseguir assumindo que a API_KEY está configurada externamente nas envs do servidor Vercel?')) return;
            }

            // Iniciar UI
            ui.btn.disabled = true;
            ui.btn.classList.add('opacity-50', 'cursor-not-allowed');
            ui.resultsBox.classList.add('hidden');
            ui.resultsContent.innerHTML = '';
            ui.progressBox.classList.remove('hidden');
            ui.progressBar.classList.remove('bg-red-500');
            ui.progressBar.classList.add('bg-indigo-600');
            
            ui.progressText.innerText = 'Passo 1: Extraindo texto do PDF no servidor (Node.js)...';
            ui.progressBar.style.width = '10%';
            ui.progressPct.innerText = '10%';

            try {
                // 1. Extração via Node.js (Vercel Serverless Function)
                const formData = new FormData();
                formData.append('pdf', ui.file.files[0]);

                const extractReq = await fetch('/api/extract', { method: 'POST', body: formData });
                const extractData = await extractReq.json();
                
                if (!extractReq.ok) throw new Error(extractData.erro || 'Falha ao processar o PDF');
                
                const fragmentos = extractData.fragmentos;
                let relatorioFinal = '# Relatório Oficial: Normas ABNT\n\n*Documento auditado por IA.*\n\n---\n\n';
                
                // 2. Loop de Processamento (Vercel Serverless Function 2 - Evita Timeout de 10 segs!)
                for (let i = 0; i < fragmentos.length; i++) {
                    ui.progressText.innerText = `Análise ABNT: Lendo parte ${i + 1} de ${fragmentos.length} no DeepSeek...`;
                    const porcentagem = Math.round(10 + (((i+1) / fragmentos.length) * 90));
                    ui.progressBar.style.width = `${porcentagem}%`;
                    ui.progressPct.innerText = `${porcentagem}%`;

                    const reviewReq = await fetch('/api/review_chunk', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fragmento: fragmentos[i],
                            api_key: ui.key.value
                        })
                    });

                    const reviewData = await reviewReq.json();
                    if (!reviewReq.ok) throw new Error(reviewData.erro || 'Falha na IA DeepSeek');

                    relatorioFinal += `## Análise da Parte ${i + 1} / ${fragmentos.length}\n\n`;
                    relatorioFinal += reviewData.relatorio + '\n\n---\n\n';
                    
                    // Renderiza incremental na tela para usuário ver acontecendo
                    ui.resultsBox.classList.remove('hidden');
                    ui.resultsContent.innerHTML = marked.parse(relatorioFinal);
                }

                // Finalizado
                ui.progressText.innerText = '✅ Artigo inteiro analisado com sucesso!';
                ui.progressBar.style.width = '100%';

            } catch (err) {
                console.error(err);
                alert(`Ocorreu um Erro: ${err.message}`);
                ui.progressText.innerText = '❌ Processamento Interrompido.';
                ui.progressBar.classList.remove('bg-indigo-600');
                ui.progressBar.classList.add('bg-red-500');
            } finally {
                ui.btn.disabled = false;
                ui.btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
